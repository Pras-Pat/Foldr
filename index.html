<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch || globalThis.fetch || (typeof self !== 'undefined' ? self.fetch : undefined);
          var overriddenFetch = originalFetch;
          
          var descriptor = {
            configurable: true,
            enumerable: true,
            get: function() {
              return overriddenFetch;
            },
            set: function(val) {
              overriddenFetch = val;
            }
          };

          try {
            Object.defineProperty(globalThis, 'fetch', descriptor);
          } catch (e1) {}

          try {
            Object.defineProperty(window, 'fetch', descriptor);
          } catch (e2) {}

          if (typeof self !== 'undefined') {
            try {
              Object.defineProperty(self, 'fetch', descriptor);
            } catch (e3) {}
          }
        } catch (err) {
          console.warn('Unable to patch fetch getter/setter descriptor', err);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Foldr - Smart Collection Tab Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
